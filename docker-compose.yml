services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: govai
      POSTGRES_USER: govai
      POSTGRES_PASSWORD: ${DB_PASSWORD:-govai_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U govai -d govai"]
      interval: 5s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  gateway:
    build: ./gateway
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://govai:${DB_PASSWORD:-govai_secret}@postgres:5432/govai
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEMO_MODE: ${DEMO_MODE:-false}
      JWT_SECRET: ${JWT_SECRET:-ZMIEN_MNIE_NA_LOSOWY_32_BAJTOWY_KLUCZ_HEX}
      JWT_ALGORITHM: HS256
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://govai:${DB_PASSWORD:-govai_secret}@postgres:5432/govai
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-ZMIEN_MNIE_NA_LOSOWY_32_BAJTOWY_KLUCZ_HEX}
      JWT_ALGORITHM: HS256
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "4000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      NEXT_PUBLIC_GATEWAY_URL: http://localhost:8001
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
